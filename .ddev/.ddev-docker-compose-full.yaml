name: ddev-ara
services:
  db:
    build:
      context: /home/mbaguet/docker/Ara/.ddev/.dbimageBuild
      dockerfile: Dockerfile
      args:
        BASE_IMAGE: postgres:16
        gid: "1001"
        uid: "1001"
        username: mbaguet
    cap_add:
      - SYS_NICE
    command:
      - -c
      - config_file=/etc/postgresql/postgresql.conf
      - -c
      - hba_file=/etc/postgresql/pg_hba.conf
    container_name: ddev-ara-db
    environment:
      BITNAMI_VOLUME_DIR: ""
      COLUMNS: "189"
      DDEV_DATABASE: postgres:16
      DDEV_DATABASE_FAMILY: postgres
      DDEV_GID: "1001"
      DDEV_GOARCH: amd64
      DDEV_GOOS: linux
      DDEV_HOSTNAME: ara.ddev.site
      DDEV_PHP_VERSION: "8.4"
      DDEV_PRIMARY_URL: https://ara.ddev.site
      DDEV_PRIMARY_URL_PORT: "443"
      DDEV_PRIMARY_URL_WITHOUT_PORT: https://ara.ddev.site
      DDEV_PROJECT: ara
      DDEV_PROJECT_TYPE: generic
      DDEV_ROUTER_HTTP_PORT: "80"
      DDEV_ROUTER_HTTPS_PORT: "443"
      DDEV_SCHEME: https
      DDEV_SITENAME: ara
      DDEV_TLD: ddev.site
      DDEV_UID: "1001"
      DDEV_USER: mbaguet
      DDEV_VERSION: v1.25.1
      DOCKER_IP: 127.0.0.1
      HOST_DOCKER_INTERNAL_IP: 172.17.0.1
      IS_DDEV_PROJECT: "true"
      LINES: "43"
      MYSQL_HISTFILE: /mnt/ddev-global-cache/mysqlhistory/ara-db/mysql_history
      PGDATABASE: db
      PGHOST: 127.0.0.1
      PGPASSWORD: db
      PGUSER: db
      POSTGRES_DB: db
      POSTGRES_PASSWORD: db
      POSTGRES_USER: db
      TZ: Europe/Paris
      USER: mbaguet
    extra_hosts:
      - host.docker.internal=host-gateway
    hostname: ara-db
    healthcheck:
      test:
        - CMD-SHELL
        - /healthcheck.sh
      timeout: 1m10s
      interval: 1s
      retries: 70
      start_period: 2m0s
      start_interval: 1s
    image: postgres:16-ara-built
    labels:
      com.ddev.app-type: generic
      com.ddev.approot: /home/mbaguet/docker/Ara
      com.ddev.platform: ddev
      com.ddev.site-name: ara
    networks:
      ddev_default: null
      default: null
    ports:
      - mode: ingress
        host_ip: 127.0.0.1
        target: 5432
        published: "0"
        protocol: tcp
    restart: "no"
    stop_grace_period: 1m0s
    user: 1001:1001
    volumes:
      - type: volume
        source: database
        target: /var/lib/postgresql/data
        volume:
          nocopy: true
      - type: bind
        source: /home/mbaguet/docker/Ara/.ddev
        target: /mnt/ddev_config
        bind: {}
      - type: bind
        source: /home/mbaguet/docker/Ara/.ddev/db_snapshots
        target: /mnt/snapshots
        bind: {}
      - type: volume
        source: ddev-global-cache
        target: /mnt/ddev-global-cache
        volume: {}
    working_dir: /var/lib/postgresql/data
  web:
    build:
      context: /home/mbaguet/docker/Ara/.ddev/.webimageBuild
      dockerfile: Dockerfile
      args:
        BASE_IMAGE: ddev/ddev-webserver:v1.25.1
        DDEV_DATABASE: postgres:16
        DDEV_PHP_VERSION: "8.4"
        gid: "1001"
        uid: "1001"
        username: mbaguet
    cap_add:
      - SYS_PTRACE
    command:
      - /pre-start.sh
    container_name: ddev-ara-web
    environment:
      AWS_ACCESS_KEY_ID: changeme
      AWS_SECRET_ACCESS_KEY: changeme
      COLUMNS: "189"
      COREPACK_ENABLE_DOWNLOAD_PROMPT: "0"
      COREPACK_HOME: /mnt/ddev-global-cache/corepack
      DATABASE_SSL: "false"
      DATABASE_URL: postgres://db:db@db:5432/db
      DDEV_APPROOT: /var/www/html
      DDEV_COMPOSER_ROOT: /var/www/html
      DDEV_DATABASE: postgres:16
      DDEV_DATABASE_FAMILY: postgres
      DDEV_DOCROOT: ""
      DDEV_FILES_DIR: ""
      DDEV_FILES_DIRS: ""
      DDEV_GID: "1001"
      DDEV_GOARCH: amd64
      DDEV_GOOS: linux
      DDEV_HOSTNAME: ara.ddev.site
      DDEV_MUTAGEN_ENABLED: "false"
      DDEV_PHP_VERSION: "8.4"
      DDEV_PRIMARY_URL: https://ara.ddev.site
      DDEV_PRIMARY_URL_PORT: "443"
      DDEV_PRIMARY_URL_WITHOUT_PORT: https://ara.ddev.site
      DDEV_PROJECT: ara
      DDEV_PROJECT_TYPE: generic
      DDEV_ROUTER_HTTP_PORT: "80"
      DDEV_ROUTER_HTTPS_PORT: "443"
      DDEV_SCHEME: https
      DDEV_SITENAME: ara
      DDEV_TLD: ddev.site
      DDEV_UID: "1001"
      DDEV_USER: mbaguet
      DDEV_VERSION: v1.25.1
      DDEV_WEB_ENTRYPOINT: /mnt/ddev_config/web-entrypoint.d
      DDEV_WEBSERVER_TYPE: nginx-fpm
      DDEV_XDEBUG_ENABLED: "false"
      DDEV_XHPROF_MODE: xhgui
      DEPLOY_NAME: local
      DOCKER_IP: 127.0.0.1
      DOCROOT: ""
      DRUSH_OPTIONS_URI: https://ara.ddev.site
      FRONT_BASE_URL: https://ara.ddev.site
      GRIST_API_KEY: changeme
      GRIST_DOC_ID: changeme
      GRIST_TABLE_ID: changeme
      HOST_DOCKER_INTERNAL_IP: 172.17.0.1
      HTTP_EXPOSE: 80:80,8025:8025
      HTTPS_EXPOSE: 443:80,8026:8025
      IS_DDEV_PROJECT: "true"
      JWT_SECRET: dev-jwt-secret-a-changer-en-production
      LINES: "43"
      MAILER_PASSWORD: changeme
      MAILER_SMTP_HOST: localhost
      MAILER_SMTP_PORT: "1025"
      MAILER_SMTP_SECURE: "false"
      MAILER_USER: dev@example.com
      MYSQL_HISTFILE: /mnt/ddev-global-cache/mysqlhistory/ara-web/mysql_history
      NODE_EXTRA_CA_CERTS: /mnt/ddev-global-cache/mkcert/rootCA.pem
      PGDATABASE: db
      PGHOST: db
      PGPASSWORD: db
      PGUSER: db
      PHP_IDE_CONFIG: serverName=ara.ddev.site
      S3_BUCKET: changeme
      S3_ENDPOINT: https://s3.example.com
      S3_REGION: us-east-1
      S3_VIRTUAL_HOST: https://s3.example.com
      SSH_AUTH_SOCK: /home/.ssh-agent/socket
      START_SCRIPT_TIMEOUT: "115"
      TZ: Europe/Paris
      USER: mbaguet
      VIRTUAL_HOST: ara.ddev.site
      npm_config_cache: /mnt/ddev-global-cache/npm
    extra_hosts:
      - host.docker.internal=host-gateway
    hostname: ara-web
    healthcheck:
      test:
        - CMD-SHELL
        - /healthcheck.sh
      timeout: 1m10s
      interval: 1s
      retries: 70
      start_period: 2m0s
      start_interval: 1s
    image: ddev/ddev-webserver:v1.25.1-ara-built
    labels:
      com.ddev.app-type: generic
      com.ddev.approot: /home/mbaguet/docker/Ara
      com.ddev.platform: ddev
      com.ddev.site-name: ara
    networks:
      ddev_default: null
      default: null
    ports:
      - mode: ingress
        host_ip: 127.0.0.1
        target: 80
        protocol: tcp
      - mode: ingress
        host_ip: 127.0.0.1
        target: 443
        protocol: tcp
      - mode: ingress
        host_ip: 127.0.0.1
        target: 8025
        protocol: tcp
    restart: "no"
    user: 1001:1001
    volumes:
      - type: bind
        source: /home/mbaguet/docker/Ara
        target: /var/www/html
        consistency: cached
      - type: bind
        source: /home/mbaguet/docker/Ara/.ddev
        target: /mnt/ddev_config
        read_only: true
        bind: {}
      - type: volume
        source: ddev-global-cache
        target: /mnt/ddev-global-cache
        volume: {}
      - type: volume
        source: ddev-ssh-agent_socket_dir
        target: /home/.ssh-agent
        volume: {}
    working_dir: /var/www/html/
  xhgui:
    profiles:
      - xhgui
    container_name: ddev-ara-xhgui
    depends_on:
      db:
        condition: service_started
        required: true
    environment:
      DDEV_DATABASE_FAMILY: postgres
      HOST_DOCKER_INTERNAL_IP: 172.17.0.1
      HTTP_EXPOSE: 8143:80
      HTTPS_EXPOSE: 8142:80
      TZ: Europe/Paris
      VIRTUAL_HOST: ara.ddev.site
      XHGUI_PDO_PASS: db
      XHGUI_PDO_USER: db
      XHGUI_SAVE_HANDLER: pdo
    extra_hosts:
      - host.docker.internal=host-gateway
    healthcheck:
      test:
        - CMD-SHELL
        - /healthcheck.sh
      timeout: 1m10s
      interval: 1s
      retries: 70
      start_period: 2m0s
      start_interval: 1s
    image: ddev/ddev-xhgui:v1.25.1
    labels:
      com.ddev.approot: /home/mbaguet/docker/Ara
      com.ddev.site-name: ara
    networks:
      ddev_default: null
      default: null
    restart: "no"
    x-ddev:
      describe-url-port: "Launch: ddev xhgui"
networks:
  ddev_default:
    name: ddev_default
    external: true
  default:
    name: ddev-ara_default
    labels:
      com.ddev.platform: ddev
volumes:
  database:
    name: ara-postgres
    external: true
  ddev-global-cache:
    name: ddev-global-cache
    external: true
  ddev-ssh-agent_socket_dir:
    name: ddev-ssh-agent_socket_dir
    external: true
