http:
  routers:
    ara-xhgui-80-http:
      entrypoints:
        - http-8143
      rule: HostRegexp(`^ara\.ddev\.site$`)

      service: "ara-xhgui-80"
      tls: false
      # middlewares:
      #   - "ara-redirectHttps"
    ara-web-80-http:
      entrypoints:
        - http-80
      rule: HostRegexp(`^ara\.ddev\.site$`)

      service: "ara-web-80"
      tls: false
      # middlewares:
      #   - "ara-redirectHttps"
    ara-web-8025-http:
      entrypoints:
        - http-8025
      rule: HostRegexp(`^ara\.ddev\.site$`)

      service: "ara-web-8025"
      tls: false
      # middlewares:
      #   - "ara-redirectHttps"

    ara-xhgui-80-https:
      entrypoints:
        - http-8142
      rule: HostRegexp(`^ara\.ddev\.site$`)

      service: "ara-xhgui-80"

      tls: true

    ara-web-80-https:
      entrypoints:
        - http-443
      rule: HostRegexp(`^ara\.ddev\.site$`)

      service: "ara-web-80"

      tls: true

    ara-web-8025-https:
      entrypoints:
        - http-8026
      rule: HostRegexp(`^ara\.ddev\.site$`)

      service: "ara-web-8025"

      tls: true

  middlewares:
    ara-redirectHttps:
      redirectScheme:
        scheme: https
        permanent: true

  services:
    ara-xhgui-80:
      loadbalancer:
        servers:
          - url: http://ddev-ara-xhgui:80

    ara-web-80:
      loadbalancer:
        servers:
          - url: http://ddev-ara-web:80

    ara-web-8025:
      loadbalancer:
        servers:
          - url: http://ddev-ara-web:8025

tls:
  certificates:
    - certFile: /mnt/ddev-global-cache/traefik/certs/ara.crt
      keyFile: /mnt/ddev-global-cache/traefik/certs/ara.key
